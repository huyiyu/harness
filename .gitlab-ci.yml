before_script:
  - cd lifecycle

stages:
  - validate
  - test
  - build

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: 10
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .gradle/wrapper
    - .gradle/caches
    - .gradle/dependency-check-data

checkstyle:
  stage: validate
  image: eclipse-temurin:25-jdk
  script:
    - ./gradlew checkstyleMain checkstyleTest
  artifacts:
    paths:
      - lifecycle/build/reports/checkstyle/
    expire_in: 30 days
    when: always

pmd:
  stage: validate
  image: eclipse-temurin:25-jdk
  script:
    - ./gradlew pmdMain pmdTest
  artifacts:
    paths:
      - lifecycle/build/reports/pmd/
    expire_in: 30 days
    when: always

dependency-check:
  stage: validate
  image: eclipse-temurin:25-jdk
  script:
    - ./gradlew dependencyCheckAnalyze
  artifacts:
    paths:
      - lifecycle/build/reports/dependency-check-report.html
    expire_in: 30 days
    when: always
  allow_failure: true

unit-test:
  stage: test
  image: eclipse-temurin:25-jdk
  script:
    - ./gradlew test
  artifacts:
    reports:
      junit: lifecycle/build/test-results/test/*.xml
    paths:
      - lifecycle/build/reports/tests/test/
      - lifecycle/build/test-results/test/
    expire_in: 30 days
    when: always

jib-build:
  stage: build
  image: eclipse-temurin:25-jdk
  script:
    - ./gradlew :harness-biz:lifecycle-biz:jib -PregistryUrl=$REGISTRY_URL -PregistryUsername=$REGISTRY_USERNAME -PregistryPassword=$REGISTRY_PASSWORD
  only:
    - main
    - tags
  except:
    - merge_requests
